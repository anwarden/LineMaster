
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Metro Master - Logic & Speed</title>
    <style>
        :root { --bg: #f8f9fa; --danger: #ff4757; --success: #2ed573; --primary: #4776E6; }
        body { margin: 0; background: var(--bg); font-family: 'Arial Rounded MT Bold', sans-serif; overflow: hidden; user-select: none; }
        
        #ui { position: absolute; top: 0; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100; pointer-events: none; }
        .header { width: 100%; padding: 30px 0; display: flex; flex-direction: column; align-items: center; }
        
        #level-info { font-size: 16px; color: #adb5bd; letter-spacing: 4px; margin-bottom: 10px; font-weight: bold; }
        #instruction { font-size: 18px; color: #495057; margin-bottom: 20px; font-weight: 500; }
        
        #timer-bar-container { width: 320px; height: 14px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 3px solid #fff; }
        #timer-bar { width: 100%; height: 100%; transition: width 0.1s linear, background-color 0.4s; }

        #score-display { position: absolute; bottom: 30px; left: 30px; font-size: 80px; font-weight: 900; color: rgba(0,0,0,0.03); }
        
        /* 弹窗层 */
        .modal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 2000; color: white; text-align: center;
        }
        #fail-overlay { background: rgba(255, 71, 87, 0.98); }
        #win-overlay { background: rgba(46, 213, 115, 0.98); }

        .btn { background: white; color: #333; padding: 18px 50px; border-radius: 50px; margin-top: 25px; cursor: pointer; font-size: 22px; font-weight: bold; box-shadow: 0 8px 0 #ddd; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #ddd; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="header">
            <div id="level-info">LEVEL 01</div>
            <div id="instruction">Match the glowing colors!</div>
            <div id="timer-bar-container"><div id="timer-bar"></div></div>
        </div>
    </div>

    <div id="score-display">0</div>

    <div id="fail-overlay" class="modal">
        <h1 style="font-size: 60px; margin: 0;">CRASHED!</h1>
        <p id="fail-reason" style="font-size: 20px;">Lines cannot cross!</p>
        <div class="btn" onclick="resetGame()">RETRY</div>
    </div>

    <div id="win-overlay" class="modal">
        <h1 style="font-size: 70px; margin: 0;">VICTORY</h1>
        <p style="font-size: 20px;">You are a Metro Master!</p>
        <div class="btn" onclick="resetGame()">PLAY AGAIN</div>
    </div>

    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w, h, score = 0, currentLevel = 1, isGameOver = false;
let globalTime = 0, stations = [], connections = [];
let targetColor = '', timeLeft = 10.0, maxTime = 10.0;
let isDrawing = false, currentPath = [];

const COLORS = {
    RED: '#FF4757', BLUE: '#1E90FF', GREEN: '#2ED573', 
    PURPLE: '#A55EEA', ORANGE: '#FFA502'
};

function initLevel(lv) {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    stations = []; connections = []; currentLevel = lv; isGameOver = false;
    
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    document.getElementById('level-info').innerText = `LEVEL 0${lv}`;

    if(lv === 1) {
        maxTime = 12.0;
        document.getElementById('instruction').innerText = "Warm up: Pure Matching";
        const keys = ['RED', 'BLUE', 'GREEN'];
        keys.forEach((name, i) => {
            let x = w * (0.2 + i * 0.3);
            stations.push({ x, y: h * 0.3, name, color: COLORS[name] });
            stations.push({ x, y: h * 0.7, name, color: COLORS[name] });
        });
    } else {
        maxTime = 9.0;
        document.getElementById('instruction').innerText = "ALERT: DO NOT CROSS!";
        const keys = Object.keys(COLORS);
        keys.forEach(name => {
            stations.push({ x: w*0.1+Math.random()*w*0.8, y: h*0.2+Math.random()*h*0.2, name, color: COLORS[name] });
            stations.push({ x: w*0.1+Math.random()*w*0.8, y: h*0.6+Math.random()*h*0.2, name, color: COLORS[name] });
        });
    }
    pickMission();
}

function pickMission() {
    const connectedColors = connections.map(c => c.colorName);
    const available = [...new Set(stations.map(s => s.name))].filter(n => !connectedColors.includes(n));

    if(available.length === 0) {
        if(currentLevel === 1) setTimeout(() => initLevel(2), 500);
        else {
            isGameOver = true;
            document.getElementById('win-overlay').style.display = 'flex';
        }
        return;
    }
    targetColor = available[Math.floor(Math.random() * available.length)];
    timeLeft = maxTime;
    document.getElementById('timer-bar').style.backgroundColor = COLORS[targetColor];
}

// 核心：实时检测是否撞到了已有的线
function checkLineCrash(x, y) {
    if (currentLevel < 2) return false; // 第一关不开启交叉判定
    
    for (let conn of connections) {
        for (let p of conn.path) {
            // 判定距离：如果当前手指坐标距离已有线的点小于 12 像素，视为碰撞
            if (Math.hypot(x - p.x, y - p.y) < 12) return true;
        }
    }
    return false;
}

canvas.onmousedown = (e) => {
    if(isGameOver) return;
    const node = stations.find(s => Math.hypot(s.x - e.clientX, s.y - e.clientY) < 45);
    if(node && node.name === targetColor) {
        isDrawing = true;
        currentPath = [{x: node.x, y: node.y}];
    }
};

window.onmousemove = (e) => {
    if(!isDrawing) return;
    const x = e.clientX, y = e.clientY;
    
    // 如果撞线了，立即结束
    if(checkLineCrash(x, y)) {
        isGameOver = true;
        isDrawing = false;
        document.getElementById('fail-reason').innerText = "Line Collision Detected!";
        document.getElementById('fail-overlay').style.display = 'flex';
        return;
    }
    currentPath.push({x, y});
};

window.onmouseup = (e) => {
    if(!isDrawing) return;
    const endNode = stations.find(s => Math.hypot(s.x - e.clientX, s.y - e.clientY) < 45);
    // 判断是否成功连接到目标颜色点
    if(endNode && endNode.name === targetColor && currentPath.length > 5) {
        connections.push({ path: [...currentPath], color: COLORS[targetColor], colorName: targetColor });
        score++;
        document.getElementById('score-display').innerText = score;
        pickMission();
    }
    isDrawing = false;
    currentPath = [];
};

setInterval(() => {
    if(isGameOver) return;
    timeLeft -= 0.05;
    const bar = document.getElementById('timer-bar');
    bar.style.width = (timeLeft/maxTime*100) + '%';
    if(timeLeft <= 0) {
        isGameOver = true;
        document.getElementById('fail-reason').innerText = "You ran out of time!";
        document.getElementById('fail-overlay').style.display = 'flex';
    }
}, 50);

function resetGame() {
    score = 0; document.getElementById('score-display').innerText = "0";
    initLevel(1);
}

function loop() {
    globalTime++;
    ctx.fillStyle = '#f8f9fa';
    ctx.fillRect(0, 0, w, h);

    // 画已经成功的线
    connections.forEach(conn => {
        ctx.strokeStyle = conn.color; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(conn.path[0].x, conn.path[0].y);
        conn.path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
    });

    // 画当前拖拽的线
    if(isDrawing && currentPath.length > 0) {
        ctx.strokeStyle = COLORS[targetColor]; ctx.lineWidth = 14; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(currentPath[0].x, currentPath[0].y);
        currentPath.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
    }

    // 画车站
    stations.forEach(s => {
        let isT = s.name === targetColor;
        let p = isT ? 1 + Math.sin(globalTime*0.15)*0.1 : 1;
        ctx.save(); ctx.translate(s.x, s.y); ctx.scale(p, p);
        if(isT) { ctx.shadowBlur = 20; ctx.shadowColor = s.color; }
        ctx.fillStyle = s.color; ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
        ctx.restore();
    });
    requestAnimationFrame(loop);
}

initLevel(1);
loop();
</script>
</body>
</html>
